image: ghcr.io/sairon/{arch}-base
build_from:
  aarch64: "arm64v8/alpine:"
  amd64: "alpine:"
cosign:
  identity: https://github.com/sairon/docker-base/.*
args:
  BASHIO_VERSION: 0.17.5
  TEMPIO_VERSION: 2024.11.2
  S6_OVERLAY_VERSION: 3.1.6.2
  JEMALLOC_VERSION: 5.3.0
labels:
  io.hass.base.name: alpine
  org.opencontainers.image.source: https://github.com/sairon/docker-base
