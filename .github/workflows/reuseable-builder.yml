name: Reusable builder

on:
  workflow_call:
    inputs:
      image_repo:
        description: Image repository (e.g., "ghcr.io/owner")
        required: true
        type: string
      image_name:
        description: Image name without a tag (e.g., "base-python")
        required: true
        type: string
      image_tag:
        description: Base image tag (e.g., "3.23")
        required: true
        type: string
      tag_latest:
        description: Tag image as "latest" as well
        required: false
        default: false
        type: boolean
      context:
        description: Build context (usually the directory with Dockerfile)
        required: true
        type: string
      file:
        description: Dockerfile path (defaults to "Dockerfile" in the context directory)
        required: false
        default: ""
        type: string
      architectures:
        description: Architectures to build (JSON array, e.g., '["amd64", "aarch64"]')
        required: true
        type: string
      version:
        description: Image version label
        required: true
        type: string
      build_args:
        description: Additional build arguments (key=value format, one per line)
        required: false
        default: ""
        type: string
      push:
        description: Whether to push images to registry
        required: false
        default: false
        type: boolean
      cosign:
        description: Whether to sign images with Cosign (requires COSIGN_KEY env var)
        required: false
        default: true
        type: boolean
      cosign_identity:
        description: Certificate identity regexp for verifying cache images (defaults to current repo pattern)
        required: false
        default: ""
        type: string
      cosign_base_identity:
        description: Certificate identity regexp for verifying the base (FROM) image
        required: false
        default: ""
        type: string
      cosign_issuer:
        description: Certificate OIDC issuer regexp for all cosign verification
        required: false
        default: "https://token.actions.githubusercontent.com"
        type: string
      cosign_base_issuer:
        description: Certificate OIDC issuer regexp for base image verification (defaults to cosign_issuer)
        required: false
        default: ""
        type: string
      verify_image:
        description: Base image reference to verify with cosign before building
        required: false
        default: ""
        type: string

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix from architectures
        id: set-matrix
        shell: bash
        env:
          ARCHITECTURES: ${{ inputs.architectures }}
        run: |
          matrix=$(jq -c '{include: [.[] |
            if . == "amd64" then {arch: "amd64", os: "ubuntu-24.04", platform: "linux/amd64"}
            elif . == "aarch64" then {arch: "aarch64", os: "ubuntu-24.04-arm", platform: "linux/arm64"}
            else empty end
          ]}' <<< "${ARCHITECTURES}")
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6.0.2

      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        if: inputs.cosign || inputs.verify_image != ''
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v2.5.3"

      - name: Verify cache image
        if: inputs.cosign
        id: verify_cache
        continue-on-error: true
        shell: bash
        env:
          IMAGE_REF: ${{ inputs.image_repo }}/${{ matrix.arch }}-${{ inputs.image_name }}:${{ inputs.image_tag }}
          COSIGN_IDENTITY: ${{ inputs.cosign_identity }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COSIGN_ISSUER: ${{ inputs.cosign_issuer }}
        run: |
          identity="${COSIGN_IDENTITY}"
          if [[ -z "${identity}" ]]; then
            identity="https://github.com/${GITHUB_REPOSITORY}/.*"
          fi

          for i in {1..6}; do
            if cosign verify \
              --certificate-identity-regexp "${identity}" \
              --certificate-oidc-issuer-regexp "${COSIGN_ISSUER}" \
              "${IMAGE_REF}" 2>/dev/null; then
              echo "Cache image verified: ${IMAGE_REF}"
              echo "verified=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Verification attempt ${i} failed, retrying..."
            sleep $((2 ** i))
          done

          echo "::warning::Cache image verification failed for ${IMAGE_REF}, building without cache"
          echo "verified=false" >> "$GITHUB_OUTPUT"

      - name: Verify base image
        if: inputs.push && inputs.verify_image != '' && inputs.cosign_base_identity != ''
        shell: bash
        env:
          VERIFY_IMAGE: ${{ inputs.verify_image }}
          COSIGN_BASE_IDENTITY: ${{ inputs.cosign_base_identity }}
          COSIGN_BASE_ISSUER: ${{ inputs.cosign_base_issuer || inputs.cosign_issuer }}
        run: |
          for i in {1..6}; do
            if cosign verify \
              --certificate-identity-regexp "${COSIGN_BASE_IDENTITY}" \
              --certificate-oidc-issuer-regexp "${COSIGN_BASE_ISSUER}" \
              "${VERIFY_IMAGE}" 2>/dev/null; then
              echo "Base image verified: ${VERIFY_IMAGE}"
              exit 0
            fi
            echo "Verification attempt ${i} failed, retrying..."
            sleep $((2 ** i))
          done

          echo "::error::Base image verification failed for ${VERIFY_IMAGE}"
          exit 1

      - name: Set build options
        id: options
        shell: bash
        env:
          COSIGN_ENABLED: ${{ inputs.cosign }}
          CACHE_VERIFIED: ${{ steps.verify_cache.outputs.verified }}
          CACHE_REF: ${{ inputs.image_repo }}/${{ matrix.arch }}-${{ inputs.image_name }}:${{ inputs.image_tag }}
        run: |
          tags=()
          tags+=("${{ inputs.image_repo }}/${{ matrix.arch }}-${{ inputs.image_name }}:${{ inputs.image_tag }}")

          if [[ "${{ inputs.push }}" == "true" ]]; then
            echo push="true" >> "$GITHUB_OUTPUT"
            echo load="false" >> "$GITHUB_OUTPUT"
            echo output="type=image,push=true,compression=zstd,compression-level=9,force-compression=true,oci-mediatypes=true" >> "$GITHUB_OUTPUT"

            tags+=("${{ inputs.image_repo }}/${{ matrix.arch }}-${{ inputs.image_name }}:${{ inputs.image_tag }}-${{ inputs.version }}")
          else
            echo push="false" >> "$GITHUB_OUTPUT"
            echo load="true" >> "$GITHUB_OUTPUT"
            echo output="type=docker" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ inputs.tag_latest }}" == "true" ]]; then
            tags+=("${{ inputs.image_repo }}/${{ matrix.arch }}-${{ inputs.image_name }}:latest")
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          build_date="$(date --rfc-3339=seconds --utc)"

          build_args=()
          build_args+=("BUILD_VERSION=${{ inputs.version }}")
          build_args+=("BUILD_ARCH=${{ matrix.arch }}")
          build_args+=("BUILD_DATE=${build_date}")
          while IFS= read -r line; do
            [[ -n "$line" ]] && build_args+=("$line")
          done <<< "${{ inputs.build_args }}"
          {
            echo "build_args<<EOF"
            printf '%s\n' "${build_args[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "${COSIGN_ENABLED}" != "true" ]] || [[ "${CACHE_VERIFIED}" == "true" ]]; then
            echo "cache_from=type=registry,ref=${CACHE_REF}" >> "$GITHUB_OUTPUT"
          else
            echo "Building without cache (cosign enabled but cache not verified)"
            echo "cache_from=" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "${{ inputs.file }}" ]; then
            echo file="${{ inputs.context }}/Dockerfile" >> "$GITHUB_OUTPUT"
          else
            echo file="${{ inputs.file }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ steps.options.outputs.file }}
          platforms: ${{ matrix.platform }}
          pull: true
          push: ${{ steps.options.outputs.push }}
          load: ${{ steps.options.outputs.load }}
          build-args: ${{ steps.options.outputs.build_args }}
          tags: ${{ steps.options.outputs.tags }}
          outputs: ${{ steps.options.outputs.output }}
          cache-from: ${{ steps.options.outputs.cache_from }}

      - name: Sign per-arch image
        if: inputs.push && inputs.cosign
        shell: bash
        env:
          IMAGE_REF: ${{ inputs.image_repo }}/${{ matrix.arch }}-${{ inputs.image_name }}@${{ steps.build.outputs.digest }}
        run: |
          for i in {1..6}; do
            if cosign sign --yes "${IMAGE_REF}"; then
              echo "Signed: ${IMAGE_REF}"
              exit 0
            fi
            echo "Signing attempt ${i} failed, retrying..."
            sleep $((2 ** i))
          done

          echo "::error::Failed to sign image ${IMAGE_REF}"
          exit 1

  manifest:
    name: Publish multi-arch manifest
    if: inputs.push
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        if: inputs.cosign == 'true'
        with:
          cosign-release: "v2.5.3"

      - name: Create manifest and sign tags
        shell: bash
        env:
          ARCHITECTURES: ${{ inputs.architectures }}
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_NAME: ${{ inputs.image_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          VERSION: ${{ inputs.version }}
          TAG_LATEST: ${{ inputs.tag_latest }}
          COSIGN: ${{ inputs.cosign }}
        run: |
          mapfile -t arches < <(jq -r '.[]' <<< "${ARCHITECTURES}")

          source_images=()
          for arch in "${arches[@]}"; do
            source_images+=("${IMAGE_REPO}/${arch}-${IMAGE_NAME}:${IMAGE_TAG}-${VERSION}")
          done

          tags=(
            "${IMAGE_REPO}/${IMAGE_NAME}:${IMAGE_TAG}"
            "${IMAGE_REPO}/${IMAGE_NAME}:${IMAGE_TAG}-${VERSION}"
          )
          if [[ "${TAG_LATEST}" == "true" ]]; then
            tags+=("${IMAGE_REPO}/${IMAGE_NAME}:latest")
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("--tag" "${tag}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${source_images[@]}"

          if [[ "${COSIGN}" == "true" ]]; then
            for tag in "${tags[@]}"; do
              cosign sign --yes "${tag}"
            done
          fi
